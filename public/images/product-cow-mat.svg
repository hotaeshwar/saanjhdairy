<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Soft shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="12" stdDeviation="8" flood-opacity="0.18" flood-color="#000000"/>
    </filter>
    <!-- Texture pattern for the rubber mat -->
    <pattern id="mat-grid" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(25)">
      <rect width="14" height="14" fill="#1D1D1D"/>
      <circle cx="7" cy="7" r="2" fill="#3D3D3D"/>
      <line x1="0" y1="0" x2="14" y2="0" stroke="#111111" stroke-width="0.8"/>
      <line x1="0" y1="0" x2="0" y2="14" stroke="#111111" stroke-width="0.8"/>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="none" />
  
  <!-- Mat Main Body with 3D perspective / skewed layout -->
  <g transform="translate(70, 70) skewX(-22) rotate(6)" filter="url(#shadow)">
    <!-- Bottom/Side thickness extrusion -->
    <path d="M 0 140 L 8 150 L 248 150 L 240 140 Z" fill="#0A0A0A" />
    <path d="M 240 0 L 248 10 L 248 150 L 240 140 Z" fill="#121212" />
    <!-- Top Surface -->
    <rect x="0" y="0" width="240" height="140" fill="url(#mat-grid)" rx="4" ry="4" stroke="#282828" stroke-width="1.2" />
  </g>
</svg>
